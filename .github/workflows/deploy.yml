name: Deploy GRIP System

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt

      - run: python -c "import app.main"

      - run: curl ${{ secrets.RENDER_DEPLOY_HOOK }}