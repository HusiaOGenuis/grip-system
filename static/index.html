<!DOCTYPE html>
<html>
<head>
    <title>GRIP Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://js.paystack.co/v1/inline.js"></script>
</head>

<body style="background:#0b1220;color:white;font-family:sans-serif">

<h1>GRIP Dashboard</h1>

<input id="email" placeholder="Enter Email"><br><br>
<button onclick="createUser()">Generate API Key</button><br><br>

<input id="apiKey" placeholder="Enter API key"><br><br>

<input type="file" id="file">
<button onclick="upload()">Upload CSV</button>

<h2>Records</h2>
<button onclick="loadRecords()">Load Records</button>

<h2>Analyze</h2>
<button onclick="analyze()">Run Intelligence</button>

<h2>Upgrade</h2>
<button onclick="upgrade()">Upgrade</button>

<div id="output"></div>
<canvas id="riskChart" width="400" height="200"></canvas>

<script>
const API_URL = window.location.origin;

// CREATE USER
async function createUser() {
    const email = document.getElementById("email").value;

    let res = await fetch(API_URL + "/create-user?email=" + email, { method: "POST" });
    let data = await res.json();

    document.getElementById("apiKey").value = data.api_key;
}

// UPLOAD
async function upload() {
    const key = document.getElementById("apiKey").value;
    const file = document.getElementById("file").files[0];

    let formData = new FormData();
    formData.append("file", file);

    let res = await fetch(API_URL + "/upload", {
        method: "POST",
        headers: { "x-api-key": key },
        body: formData
    });

    let data = await res.json();
    document.getElementById("output").innerText = JSON.stringify(data, null, 2);
}

// LOAD RECORDS
async function loadRecords() {
    const key = document.getElementById("apiKey").value;

    let res = await fetch(API_URL + "/records", {
        headers: { "x-api-key": key }
    });

    let data = await res.json();
    document.getElementById("output").innerText = JSON.stringify(data, null, 2);
}

// ANALYZE
score = 0
signals = []

for r in records:
    text = str(r).lower()

    if "fraud" in text:
        score += 25
        signals.append("Fraud signal")

    if "breach" in text:
        score += 30
        signals.append("Security breach")

    if "delay" in text:
        score += 10
        signals.append("Operational delay")

    if "high" in text:
        score += 15

risk_score = min(100, score)

level = (
    "HIGH" if risk_score > 70 else
    "MEDIUM" if risk_score > 30 else
    "LOW"
)
// PAYSTACK
function upgrade() {
    const email = document.getElementById("email").value;
    const key = document.getElementById("apiKey").value;

    let handler = PaystackPop.setup({
        key: "pk_test_XXXXXXX",
        email: email,
        amount: 50000,
        currency: "ZAR",

        callback: function(response) {
            fetch(API_URL + "/verify-payment/" + response.reference, {
                headers: { "x-api-key": key }
            })
            .then(res => res.json())
            .then(data => {
                document.getElementById("output").innerText =
                    JSON.stringify(data, null, 2);
            });
        }
    });

    handler.openIframe();
}
}
</script>

</body>
</html>
