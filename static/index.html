<!DOCTYPE html>
<html>
<head>
    <title>GRIP SYSTEM</title>
</head>

<body>
    <h1>GRIP SYSTEM</h1>

    <input type="file" id="fileInput">
    <button onclick="upload()">Upload</button>
    <br><br>

    <button onclick="loadFiles()">Load Available Files</button>
    <select id="fileList"></select>
    <br><br>

    <button onclick="analyze()">Analyze Selected</button>
    <br><br>

    <button onclick="download()">Download Selected</button>

    <pre id="output"></pre>

    <script>
    // =========================
    // LOAD FILES
    // =========================
    async function loadFiles() {
        const res = await fetch("/files");
        const data = await res.json();

        console.log("FILES RESPONSE:", data);

        const select = document.getElementById("fileList");
        select.innerHTML = "";

        data.files.forEach(file => {
            const option = document.createElement("option");
            option.value = file;
            option.textContent = file;
            select.appendChild(option);
        });
    }

    // =========================
    // UPLOAD
    // =========================
    async function upload() {
        const fileInput = document.getElementById("fileInput");
        const file = fileInput.files[0];

        if (!file) {
            alert("Select a file");
            return;
        }

        const formData = new FormData();
        formData.append("file", file);

        await fetch("/upload", {
            method: "POST",
            body: formData
        });

        alert("Uploaded");
        loadFiles();
    }

    // =========================
    // ANALYZE (CONTRACT FIXED)
    // =========================
    async function analyze() {
        const file = document.getElementById("fileList").value;

        if (!file) {
            alert("Select file first");
            return;
        }

        const res = await fetch("/analyze", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                file_name: file
            })
        });

        const data = await res.json();

        document.getElementById("output").textContent =
            JSON.stringify(data, null, 2);
    }

    // =========================
    // DOWNLOAD (PAYSTACK FLOW)
    // =========================
    async function download() {
        const file = document.getElementById("fileList").value;

        if (!file) {
            alert("Select file");
            return;
        }

        const ref = prompt("Enter Paystack reference");

        if (!ref) {
            alert("Payment reference required");
            return;
        }

        const res = await fetch(`/download/${file}?reference=${ref}`);
        const data = await res.json();

        window.open(data.url);
    }
    </script>

</body>
</html>
