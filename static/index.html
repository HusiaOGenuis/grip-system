<!DOCTYPE html>
<html>
<head>
    <title>GRIP SYSTEM</title>
</head>
<body>

<h1>GRIP SYSTEM</h1>

<!-- ========================= -->
<!-- UPLOAD CONTRACT -->
<!-- ========================= -->
<input type="file" id="fileInput">
<button onclick="uploadFile()">Upload</button>

<br><br>

<!-- ========================= -->
<!-- LOAD FILES FROM SUPABASE -->
<!-- ========================= -->
<button onclick="loadFiles()">Load Available Files</button>

<select id="fileList"></select>

<br><br>

<!-- ========================= -->
<!-- ANALYZE -->
<!-- ========================= -->
<button onclick="analyzeFile()">Analyze Selected</button>

<br><br>

<!-- ========================= -->
<!-- DOWNLOAD -->
<!-- ========================= -->
<button onclick="downloadFile()">Download Selected</button>

<br><br>

<!-- ========================= -->
<!-- OUTPUT -->
<!-- ========================= -->
<pre id="output"></pre>

<script>

async function uploadFile() {
    const fileInput = document.getElementById('fileInput');

    if (!fileInput.files.length) {
        alert("Select a file first");
        return;
    }

    const formData = new FormData();
    formData.append('file', fileInput.files[0]);

    const res = await fetch('/upload', {
        method: 'POST',
        body: formData
    });

    const data = await res.json();
    document.getElementById('output').innerText = JSON.stringify(data, null, 2);
}

async function loadFiles() {
    const res = await fetch('/files');
    const data = await res.json();

    const select = document.getElementById('fileList');
    select.innerHTML = '';

    data.files.forEach(file => {
        const opt = document.createElement('option');
        opt.value = file;
        opt.text = file;
        select.appendChild(opt);
    });
}

async function analyzeFile() {
    const file = document.getElementById('fileList').value;

    if (!file) {
        alert("No file selected");
        return;
    }

    const res = await fetch('/analyze', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ file_name: file })
    });

    const data = await res.json();
    document.getElementById('output').innerText = JSON.stringify(data, null, 2);
}

async function downloadFile() {
    const file = document.getElementById('fileList').value;

    if (!file) {
        alert("No file selected");
        return;
    }

    const res = await fetch(`/download/${file}`);
    const data = await res.json();

    window.open(data.download_url, '_blank');
}

</script>

</body>
</html>
