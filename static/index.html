<!DOCTYPE html>
<html>
<head>
    <title>GRIP Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://js.paystack.co/v1/inline.js"></script>
</head>

<body style="background:#0b1220;color:white;font-family:sans-serif">

<h1>GRIP Dashboard</h1>

<input id="email" placeholder="Enter Email"><br><br>
<button onclick="createUser()">Generate API Key</button><br><br>

<input id="apiKey" placeholder="Enter API key"><br><br>

<input type="file" id="file">
<button onclick="upload()">Upload CSV</button>

<h2>Records</h2>
<button onclick="loadRecords()">Load Records</button>

<h2>Analyze</h2>
<button onclick="analyze()">Run Intelligence</button>

<h2>Upgrade</h2>
<button onclick="upgrade()">Upgrade</button>

<div id="output"></div>
<canvas id="riskChart" width="400" height="200"></canvas>

<script>
const API_URL = window.location.origin;

// CREATE USER
async function createUser() {
    const email = document.getElementById("email").value;

    let res = await fetch(API_URL + "/create-user?email=" + email, {
        method: "POST"
    });

    let data = await res.json();
    document.getElementById("apiKey").value = data.api_key;
}

// UPLOAD
async function upload() {
    const key = document.getElementById("apiKey").value;
    const file = document.getElementById("file").files[0];

    let formData = new FormData();
    formData.append("file", file);

    let res = await fetch(API_URL + "/upload", {
        method: "POST",
        headers: { "x-api-key": key },
        body: formData
    });

    let data = await res.json();
    document.getElementById("output").innerText =
        JSON.stringify(data, null, 2);
}

// LOAD RECORDS
async function loadRecords() {
    const key = document.getElementById("apiKey").value;

    let res = await fetch(API_URL + "/records", {
        headers: { "x-api-key": key }
    });

    let data = await res.json();
    document.getElementById("output").innerText =
        JSON.stringify(data, null, 2);
}

// ANALYZE
async function analyze() {
    const key = document.getElementById("apiKey").value;

    let res = await fetch(API_URL + "/analyze", {
        headers: { "x-api-key": key }
    });

    let data = await res.json();

    document.getElementById("output").innerHTML = `
        <h3>GRIP Intelligence Report</h3>
        Risk: ${data.risk.level}<br>
        Score: ${data.risk.current_score}
    `;

    const ctx = document.getElementById("riskChart").getContext("2d");

    new Chart(ctx, {
        type: "bar",
        data: {
            labels: ["Current", "Predicted"],
            datasets: [{
                label: "Risk",
                data: [
                    data.risk.current_score,
                    data.risk.predicted_score
                ]
            }]
        }
    });
}

// PAYSTACK
function upgrade() {
    const email = document.getElementById("email").value;

    let handler = PaystackPop.setup({
        key: "pk_test_xxxxx",
        email: email,
        amount: 50000,
        currency: "ZAR",

        callback: function(response) {
            fetch(API_URL + "/verify-payment/" + response.reference)
                .then(res => res.json())
                .then(data => {
                    document.getElementById("output").innerText =
                        JSON.stringify(data, null, 2);
                });
        }
    });

    handler.openIframe();
}
</script>

</body>
</html>
