<!DOCTYPE html>
<html>
<head>
    <title>GRIP Control Panel</title>
</head>
<body>

<h1>GRIP Control Panel</h1>

<hr>

<h2>Upload CSV</h2>

<input type="file" id="fileInput">
<button onclick="uploadCSV()">Upload CSV</button>

<br><br>

<input id="datasetId" placeholder="Dataset ID">

<script>
const API = "https://YOUR-RENDER-URL.onrender.com";

async function uploadCSV() {
    const input = document.getElementById("fileInput");

    if (input.files.length === 0) {
        alert("Please select a file first");
        return;
    }

    const file = input.files[0];

    const formData = new FormData();
    formData.append("file", file);  // ⚠️ THIS MUST BE THE FILE OBJECT

    try {
        const response = await fetch(API + "/upload", {
            method: "POST",
            body: formData
        });

        const data = await response.json();

        if (!response.ok) {
            alert("Upload failed: " + JSON.stringify(data));
            return;
        }

        document.getElementById("datasetId").value = data.dataset_id;
        alert("Upload successful");

    } catch (error) {
        alert("Network error: " + error);
    }
}
</script>

</body>
</html>
