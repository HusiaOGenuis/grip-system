<!DOCTYPE html>
<html>
<body style="background:#0b1220;color:white;font-family:sans-serif">

<h1>GRIP Dashboard</h1>

<input id="email" placeholder="Enter Email"><br><br>
<input id="apiKey" placeholder="Enter API Key"><br><br>

<input type="file" id="file">
<button onclick="upload()">Upload CSV</button>

<h2>Records</h2>
<button onclick="loadRecords()">Load Records</button>

<h2>Upgrade</h2>
<button onclick="upgrade('basic')">Basic</button>
<button onclick="upgrade('pro')">Pro</button>
<button onclick="upgrade('enterprise')">Enterprise</button>

<pre id="output"></pre>

<script>
const API = window.location.origin;

async function upload() {
    const file = document.getElementById("file").files[0];
    const key = document.getElementById("apiKey").value;

    let formData = new FormData();
    formData.append("file", file);

    let res = await fetch(API + "/upload", {
        method: "POST",
        headers: { "x-api-key": key },
        body: formData
    });

    alert(await res.text());
}

async function loadRecords() {
    const key = document.getElementById("apiKey").value;

    let res = await fetch(API + "/records", {
        headers: { "x-api-key": key }
    });

    let data = await res.json();
    document.getElementById("output").innerText = JSON.stringify(data, null, 2);
}

async function upgrade(plan) {
    const key = document.getElementById("apiKey").value;
    const email = document.getElementById("email").value;

    let res = await fetch(API + "/paystack/initialize?email=" + email + "&plan=" + plan, {
        method: "POST",
        headers: { "x-api-key": key }
    });

    let data = await res.json();
    window.location.href = data.data.authorization_url;
}
</script>

</body>
</html>
