<!DOCTYPE html>
<html>
<head>
    <title>GRIP Dashboard</title>
    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: #e2e8f0;
            padding: 20px;
        }

        h1 {
            color: #38bdf8;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th, td {
            padding: 10px;
            border-bottom: 1px solid #334155;
            text-align: left;
        }

        th {
            background: #1e293b;
        }

        tr:hover {
            background: #1e293b;
        }

        .high {
            color: #ef4444;
        }

        .low {
            color: #22c55e;
        }

        button {
            background: #38bdf8;
            border: none;
            padding: 10px 15px;
            cursor: pointer;
            color: black;
            font-weight: bold;
        }
    </style>
</head>
<body>

<h1>GRIP Risk Dashboard</h1>

<button onclick="loadReports()">Load Reports</button>

<table id="reports">
    <thead>
        <tr>
            <th>File</th>
            <th>Rows</th>
            <th>Score</th>
            <th>Risk</th>
        </tr>
    </thead>
    <tbody></tbody>
</table>

<script>
const API = "https://gripsystem.onrender.com";

async function loadReports() {
    const res = await fetch(`${API}/reports`);
    const data = await res.json();

    const tbody = document.querySelector("#reports tbody");
    tbody.innerHTML = "";

    data.forEach(r => {
        const analysis = r.analysis;

        const tr = document.createElement("tr");

        tr.innerHTML = `
            <td>${analysis.file_name}</td>
            <td>${analysis.summary.rows}</td>
            <td>${analysis.quality.score}</td>
            <td class="${analysis.fraud.risk === 'HIGH' ? 'high' : 'low'}">
                ${analysis.fraud.risk}
            </td>
        `;

        tbody.appendChild(tr);
    });
}
</script>

</body>
</html>
