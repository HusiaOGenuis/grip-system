<!DOCTYPE html>
<html>
<head>
    <title>GRIP Control Panel</title>
</head>
<body>

<h1>GRIP Control Panel</h1>

<hr>

<h2>Upload CSV</h2>

<input type="file" id="fileInput">
<button onclick="upload()">Upload</button>

<br><br>

<input id="datasetId" placeholder="Dataset ID">

<br><br>

<button onclick="analyze()">Analyze</button>
<button onclick="generate()">Generate Report</button>
<button onclick="download()">Download Report</button>

<script>
const API = "https://YOUR-RENDER-URL.onrender.com";

async function upload() {
    const input = document.getElementById("fileInput");

    if (input.files.length === 0) {
        alert("Select a file first");
        return;
    }

    const file = input.files[0];
    const form = new FormData();
    form.append("file", file);

    const res = await fetch(API + "/upload", {
        method: "POST",
        body: form
    });

    const data = await res.json();

    if (!res.ok) {
        alert(JSON.stringify(data));
        return;
    }

    document.getElementById("datasetId").value = data.dataset_id;
    alert("Uploaded");
}

async function analyze() {
    const id = document.getElementById("datasetId").value;

    const form = new FormData();
    form.append("dataset_id", id);

    const res = await fetch(API + "/analyze", {
        method: "POST",
        body: form
    });

    alert(await res.text());
}

async function generate() {
    const id = document.getElementById("datasetId").value;

    const form = new FormData();
    form.append("dataset_id", id);

    const res = await fetch(API + "/generate-report", {
        method: "POST",
        body: form
    });

    alert(await res.text());
}

function download() {
    const id = document.getElementById("datasetId").value;
    window.open(API + "/download/" + id);
}
</script>

</body>
</html>
