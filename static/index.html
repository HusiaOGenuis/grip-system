<!DOCTYPE html>
<html>
<body>

<h1>GRIP Control Panel</h1>

<button onclick="loadDashboard()">Refresh Dashboard</button>

<pre id="dashboard"></pre>

<hr>

<input type="file" id="fileInput">
<button onclick="upload()">Upload CSV</button>

<br><br>

<input id="datasetId" placeholder="Dataset ID">

<br><br>

<button onclick="analyze()">Analyze</button>
<button onclick="pay()">Verify Payment</button>
<button onclick="generate()">Generate Report</button>
<button onclick="download()">Download</button>

<script>
const API = "https://grip-system.onrender.com";

async function loadDashboard() {
    const res = await fetch(API + "/dashboard");
    const data = await res.json();
    document.getElementById("dashboard").innerText = JSON.stringify(data, null, 2);
}

async function upload() {
    const fileInput = document.getElementById("fileInput");

    if (fileInput.files.length === 0) {
        alert("Select a file first");
        return;
    }

    const file = fileInput.files[0];

    const form = new FormData();
    form.append("file", file);

    try {
        const res = await fetch(API + "/upload", {
            method: "POST",
            body: form
        });

        const data = await res.json();

        console.log("UPLOAD RESPONSE:", data); // 🔍 DEBUG

        if (!res.ok) {
            alert(JSON.stringify(data));
            return;
        }

        if (!data.dataset_id) {
            alert("No dataset_id returned");
            return;
        }

        document.getElementById("datasetId").value = data.dataset_id;

    } catch (err) {
        alert("Upload failed: " + err);
    }
}

async function analyze() {
    const id = document.getElementById("datasetId").value;

    if (!id) {
        alert("Dataset ID missing");
        return;
    }

    const form = new FormData();
    form.append("dataset_id", id);

    const res = await fetch(API + "/analyze", {
        method: "POST",
        body: form
    });

    alert(await res.text());
}

async function pay() {
    const id = document.getElementById("datasetId").value;

    const form = new FormData();
    form.append("dataset_id", id);

    await fetch(API + "/verify-payment", {
        method: "POST",
        body: form
    });

    alert("Payment unlocked");
}

async function generate() {
    const id = document.getElementById("datasetId").value;

    const form = new FormData();
    form.append("dataset_id", id);

    const res = await fetch(API + "/generate-report", {
        method: "POST",
        body: form
    });

    alert(await res.text());
}

function download() {
    const id = document.getElementById("datasetId").value;

    if (!id) {
        alert("Dataset ID missing");
        return;
    }

    window.open(API + "/download/" + id);
}
</script>

</body>
</html>
