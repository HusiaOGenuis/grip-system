<!DOCTYPE html>
<html>
<head>
    <title>GRIP Dashboard</title>
</head>
<body>

<h2>GRIP Control Panel</h2>

<input id="apiKey" placeholder="API Key">
<button onclick="loadDashboard()">Refresh</button>

<hr>

<h3>Datasets</h3>
<ul id="datasets"></ul>

<h3>Payments</h3>
<ul id="payments"></ul>

<h3>Reports</h3>
<ul id="reports"></ul>

<hr>

<h3>Actions</h3>

<input type="file" id="file">
<button onclick="upload()">Upload CSV</button>

<br><br>

<input id="datasetId" placeholder="Dataset ID">
<button onclick="analyze()">Analyze</button>
<button onclick="generateReport()">Generate Report</button>

<pre id="output"></pre>

<script>

// -----------------------------
// LOAD DASHBOARD
// -----------------------------
async function loadDashboard() {
    const key = document.getElementById("apiKey").value;

    const res = await fetch("/dashboard", {
        headers: {"x-api-key": key}
    });

    const data = await res.json();

    // DATASETS
    const ds = document.getElementById("datasets");
    ds.innerHTML = "";
    data.datasets.forEach(d => {
        const li = document.createElement("li");
        li.innerText = d.dataset_id;
        ds.appendChild(li);
    });

    // PAYMENTS
    const ps = document.getElementById("payments");
    ps.innerHTML = "";
    data.payments.forEach(p => {
        const li = document.createElement("li");
        li.innerText = p.reference + " → " + p.status;
        ps.appendChild(li);
    });

    // REPORTS (NEW)
    const rs = document.getElementById("reports");
    rs.innerHTML = "";
    if (data.reports) {
        data.reports.forEach(r => {
            const li = document.createElement("li");
            li.innerHTML = `
                ${r.report_id}
                <button onclick="downloadReport('${r.report_id}')">Download</button>
            `;
            rs.appendChild(li);
        });
    }
}

// -----------------------------
// UPLOAD
// -----------------------------
async function upload() {
    const file = document.getElementById("file").files[0];
    const key = document.getElementById("apiKey").value;

    const formData = new FormData();
    formData.append("file", file);

    const res = await fetch("/upload", {
        method: "POST",
        headers: {"x-api-key": key},
        body: formData
    });

    const data = await res.json();
    document.getElementById("output").innerText = JSON.stringify(data, null, 2);
}

// -----------------------------
// ANALYZE
// -----------------------------
async function analyze() {
    const id = document.getElementById("datasetId").value;
    const key = document.getElementById("apiKey").value;

    const res = await fetch(`/analyze?dataset_id=${id}`, {
        method: "POST",
        headers: {"x-api-key": key}
    });

    const data = await res.json();
    document.getElementById("output").innerText = JSON.stringify(data, null, 2);
}

// -----------------------------
// REPORT
// -----------------------------
async function generateReport() {
    const key = document.getElementById("apiKey").value;
    const id = document.getElementById("datasetId").value;

    const res = await fetch(`/report?dataset_id=${id}`, {
        method: "POST",
        headers: {"x-api-key": key}
    });

    const data = await res.json();
    document.getElementById("output").innerText = JSON.stringify(data, null, 2);
}

// -----------------------------
// DOWNLOAD
// -----------------------------
function downloadReport(id) {
    const key = document.getElementById("apiKey").value;

    window.open(`/report/${id}?x-api-key=${key}`);
}

</script>

</body>
</html>
