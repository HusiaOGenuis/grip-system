<!DOCTYPE html>
<html>
<head>
    <title>GRIP SYSTEM</title>
</head>
<body>

<h1>GRIP SYSTEM</h1>

<!-- UPLOAD -->
<input type="file" id="fileInput">
<button onclick="upload()">Upload</button>

<br><br>

<!-- LOAD FILES -->
<button onclick="loadFiles()">Load Available Files</button>

<select id="fileSelect">
    <option value="">-- Select File --</option>
</select>

<br><br>

<!-- ACTIONS -->
<button onclick="analyze()">Analyze Selected</button>
<button onclick="download()">Download Selected</button>

<script>

async function upload() {
    const file = document.getElementById("fileInput").files[0];

    if (!file) {
        alert("Select file first");
        return;
    }

    const formData = new FormData();
    formData.append("file", file);

    const res = await fetch("/upload", {
        method: "POST",
        body: formData
    });

    const data = await res.json();
    alert("Uploaded: " + data.file);
}

async function loadFiles() {
    const res = await fetch("/files");
    const data = await res.json();

    console.log("FILES RESPONSE:", data);

    const select = document.getElementById("fileSelect");

    // clear existing
    select.innerHTML = '<option value="">-- Select File --</option>';

    data.files.forEach(file => {
        const option = document.createElement("option");
        option.value = file;
        option.text = file;
        select.appendChild(option);
    });
}

async function analyze() {
    const file = document.getElementById("fileSelect").value;

    if (!file) {
        alert("Select file first");
        return;
    }

    const res = await fetch("/analyze?file_name=" + file, {
        method: "POST"
    });

    const data = await res.json();

    alert("Rows: " + data.rows + "\nColumns: " + data.columns);
}

async function download() {
    const file = document.getElementById("fileSelect").value;

    if (!file) {
        alert("Select file first");
        return;
    }

    const res = await fetch("/download/" + file);
    const data = await res.json();

    window.open(data.download_url, "_blank");
}

</script>

</body>
</html>
