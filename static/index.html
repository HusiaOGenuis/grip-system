```html
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>GRIP Dashboard</title>
  <script src="https://js.paystack.co/v1/inline.js"></script>
</head>

<body>
  <h2>GRIP SYSTEM</h2>

  <input type="file" id="fileInput" />
  <button onclick="uploadFile()">Upload & Analyze</button>

  <br><br>

  <button onclick="payNow()">Unlock Full Report (R50)</button>

  <br><br>

  <button onclick="downloadReport()">Download Report</button>

  <script>
    let currentFileId = null;
    let userEmail = "user@example.com"; // replace with real input later

    async function uploadFile() {
      const file = document.getElementById("fileInput").files[0];
      const formData = new FormData();
      formData.append("file", file);

      const res = await fetch("/upload", {
        method: "POST",
        body: formData
      });

      const data = await res.json();
      currentFileId = data.file_id;

      alert("Uploaded + Analyzed");
    }

    function payNow() {
      if (!currentFileId) {
        alert("Upload file first");
        return;
      }

      let handler = PaystackPop.setup({
        key: "pk_test_xxxxxxxxxxxxxxxxxxxxx", // 🔴 REPLACE WITH YOUR PUBLIC KEY
        email: userEmail,
        amount: 5000, // 50 ZAR (in kobo)
        currency: "ZAR",
        ref: "GRIP-" + Math.floor((Math.random() * 1000000000) + 1),

        callback: function(response) {
          verifyPayment(response.reference);
        },

        onClose: function() {
          alert("Payment window closed");
        }
      });

      handler.openIframe();
    }

    async function verifyPayment(reference) {
      const res = await fetch("/verify-payment", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
          reference: reference,
          file_id: currentFileId
        })
      });

      const data = await res.json();

      if (data.status === "success") {
        alert("Payment verified. You can now download.");
      } else {
        alert("Verification failed");
      }
    }

    async function downloadReport() {
      if (!currentFileId) {
        alert("Upload first");
        return;
      }

      window.location.href = `/download/${currentFileId}`;
    }
  </script>
</body>
</html>
```
