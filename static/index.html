<!DOCTYPE html>
<html>
<head>
    <title>GRIP Intelligence Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<h2>GRIP Intelligence</h2>

<input id="apiKey" placeholder="API Key" />

<hr>

<input type="file" id="fileInput" />
<button onclick="upload()">Upload</button>

<hr>

<button onclick="loadFiles()">Load Files</button>
<select id="fileSelect"></select>

<button onclick="analyze()">Analyze Selected</button>

<hr>

<button onclick="loadReports()">Load Dashboard</button>
<canvas id="chart"></canvas>

<pre id="output"></pre>

<script>
const API = "https://grip-system.onrender.com";

function key() {
    return document.getElementById("apiKey").value;
}

async function upload() {
    const file = document.getElementById("fileInput").files[0];
    const form = new FormData();
    form.append("file", file);

    const res = await fetch(API + "/upload", {
        method: "POST",
        headers: {"X-API-KEY": key()},
        body: form
    });

    alert(await res.text());
}

async function loadFiles() {
    const res = await fetch(API + "/files", {
        headers: {"X-API-KEY": key()}
    });

    const data = await res.json();
    const select = document.getElementById("fileSelect");
    select.innerHTML = "";

    data.files.forEach(f => {
        const opt = document.createElement("option");
        opt.value = f.name;
        opt.textContent = f.name;
        select.appendChild(opt);
    });
}

async function analyze() {
    const filename = document.getElementById("fileSelect").value;

    const res = await fetch(API + "/analyze?filename=" + filename, {
        method: "POST",
        headers: {"X-API-KEY": key()}
    });

    const data = await res.json();
    document.getElementById("output").textContent = JSON.stringify(data, null, 2);
}

async function loadReports() {
    const res = await fetch(API + "/reports", {
        headers: {"X-API-KEY": key()}
    });

    const data = await res.json();

    const labels = data.map(r => r.file_name);
    const fraudScores = data.map(r => r.fraud.score);
    const risks = data.map(r => r.fraud.risk);

    new Chart(document.getElementById("chart"), {
        type: "bar",
        data: {
            labels: labels,
            datasets: [{
                label: "Fraud Score",
                data: fraudScores
            }]
        }
    });

    console.log("Risk Levels:", risks);
}
</script>

</body>
</html>
