<!DOCTYPE html>
<html>
<head>
    <title>GRIP Dashboard</title>
    <script src="https://js.paystack.co/v1/inline.js"></script>
</head>

<body style="background:#0b1220;color:white;font-family:sans-serif">

<h1>GRIP Dashboard</h1>

<input id="email" placeholder="Enter Email"><br><br>
<button onclick="createUser()">Generate API Key</button><br><br>

<input id="apiKey" placeholder="Enter API key"><br><br>

<input type="file" id="file">
<button onclick="upload()">Upload CSV</button>

<h2>Records</h2>
<button onclick="loadRecords()">Load Records</button>

<h2>Upgrade</h2>
<h2>Analyze</h2>
<button onclick="analyze()">Run Intelligence</button>
<button onclick="upgrade('basic')">Basic</button>
<button onclick="upgrade('pro')">Pro</button>
<button onclick="upgrade('enterprise')">Enterprise</button>
<div id="output"></div>
<canvas id="riskChart" width="400" height="200"></canvas>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
async function analyze() {
    const key = document.getElementById("apiKey").value;

    let res = await fetch(API_URL + "/analyze", {
        headers: { "x-api-key": key }
    });

    let data = await res.json();

    // TEXT OUTPUT
    let html = `
        <h3>GRIP Intelligence Report</h3>
        <b>Risk Level:</b> ${data.risk.level}<br>
        <b>Current Score:</b> ${data.risk.current_score}<br>
        <b>Predicted Score:</b> ${data.risk.predicted_score}<br><br>

        <b>Alerts:</b><br>
        ${data.alerts.map(a => "⚠️ " + a).join("<br>")}<br><br>

        <b>Top Clusters:</b><br>
        ${data.clusters.map(c => `${c.pattern} (${c.count})`).join("<br>")}
    `;

    document.getElementById("output").innerHTML = html;

    // CHART
    const ctx = document.getElementById("riskChart").getContext("2d");

    new Chart(ctx, {
        type: "bar",
        data: {
            labels: ["Current Risk", "Predicted Risk"],
            datasets: [{
                label: "Risk Score",
                data: [data.risk.current_score, data.risk.predicted_score]
            }]
        }
    });
}// ----------------------
// CREATE USER
// ----------------------
async function createUser() {
    const email = document.getElementById("email").value;

    let res = await fetch(API_URL + "/create-user?email=" + email, {
        method: "POST"
    });

    let data = await res.json();
    document.getElementById("apiKey").value = data.api_key;
}

// ----------------------
// UPLOAD
// ----------------------
async function upload() {
    const fileInput = document.getElementById("file");
    const key = document.getElementById("apiKey").value;

    let formData = new FormData();
    formData.append("file", fileInput.files[0]);

    let res = await fetch(API_URL + "/upload", {
        method: "POST",
        headers: {
            "x-api-key": key
        },
        body: formData
    });

    let data = await res.json();
    document.getElementById("output").innerText =
        JSON.stringify(data, null, 2);
}

// ----------------------
// LOAD RECORDS
// ----------------------
async function loadRecords() {
    const key = document.getElementById("apiKey").value;

    let res = await fetch(API_URL + "/records", {
        method: "GET",
        headers: {
            "x-api-key": key
        }
    });

    let data = await res.json();
    document.getElementById("output").innerText =
        JSON.stringify(data, null, 2);
}

// ----------------------
// UPGRADE (temporary)
// ----------------------
async function upgrade(plan) {
    const email = document.getElementById("email").value;
    const key = document.getElementById("apiKey").value;

    let handler = PaystackPop.setup({
        key: "pk_test_f3eb851da078147dc1ea7535ea839b6357f4aa58",
        email: email,
        amount: 50000,
        currency: "ZAR",

        callback: function(response) {

            fetch(API_URL + "/verify-payment/" + response.reference, {
                method: "GET",
                headers: {
                    "x-api-key": key
                }
            })
            .then(res => res.json())
            .then(data => {
                document.getElementById("output").innerText =
                    JSON.stringify(data, null, 2);
            });
        },

        onClose: function() {
            alert("Payment cancelled");
        }
    });

    handler.openIframe();
}
</script>

</body>
</html>
