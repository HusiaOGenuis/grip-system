<!DOCTYPE html>
<html>
<body style="background:#0b1220;color:white;font-family:sans-serif">

<h1>GRIP Dashboard</h1>

<input id="apiKey" placeholder="Enter API Key"><br><br>

<input type="file" id="file">
<button onclick="upload()">Upload CSV</button>

<h2>Records</h2>
<button onclick="loadRecords()">Load Records</button>

<pre id="output"></pre>


<script>
async function upgrade() {
    const key = document.getElementById("apiKey").value;

    let res = await fetch(API + "/paystack/initialize?email=husia", {
        method: "POST",
        headers: {
            "x-api-key": key
        }
    });

    let data = await res.json();

    window.location.href = data.data.authorization_url;
}
</script>

<button onclick="upgrade()">Upgrade to PRO</button>


<script>
const API = window.location.origin;

async function upload() {
    const file = document.getElementById("file").files[0];
    const key = document.getElementById("apiKey").value;

    let formData = new FormData();
    formData.append("file", file);

    await fetch(API + "/upload", {
        method: "POST",
        headers: { "x-api-key": key },
        body: formData
    });

    alert("Upload complete");
}

async function loadRecords() {
    const key = document.getElementById("apiKey").value;

    let res = await fetch(API + "/records", {
        headers: { "x-api-key": key }
    });

    let data = await res.json();
    document.getElementById("output").innerText = JSON.stringify(data, null, 2);
}
</script>

</body>
</html>
